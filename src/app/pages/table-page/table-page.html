<div class="table-page page-content">
	<ui-table
		[gridData]="users"
		[columns]="{
			id: {title: 'ID'},
			firstName: {title: 'First Name'},
			lastName: {title: 'Last Name'},
			email: {title: 'Email'},
			isActive: {title: 'Is Active'},
			role: {title: 'Role'},
			createdAt: {title: 'Created At'}
		}">
      <ng-template gridCellTemplate="firstName" let-dataItem="dataItem" >
        <div class="cell-content" style="font-weight: 700;">
          {{ dataItem.firstName }}
        </div>
      </ng-template>
    </ui-table>
</div>
