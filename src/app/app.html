<div class="main-content">
	<header class="header">
		<icon-menu class="menu-icon" (click)="isOpen.set(!isOpen())" #menuIcon />
		<h1>Form Components</h1>
	</header>
	<main>
		<nav class="navigation" [ngClass]="[isOpen() ? 'open' : '']" #nav>
			@for (item of navList; track $index) {
			<div class="nav-item" [routerLink]="item.path" routerLinkActive="active">
				<a>{{ item.label }}</a>
			</div>
			}
			<div class="footer">
				Developed by Marat Zinatulin<br />
				zinatulinmarat@gmail.com
			</div>
		</nav>
		<div class="display-content">
			<router-outlet />
		</div>
	</main>
</div>
