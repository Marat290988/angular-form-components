<div class="container">
  FORMS
  <form [formGroup]="formGroup">
    <div class="input-wrapper">
      <ui-input 
        [formControl]="formGroup.controls.inputControl"
        [showClearIcon]="true"
        [isOnlyNumber]="true"
        [fractionDigits]="2"
      />
    </div>
    <div class="input-wrapper">
      <ui-select 
        [formControl]="formGroup.controls.selectControl"
        [options]="options"
      />
    </div>
    <div class="input-wrapper">
      <ui-datepicker />
    </div>
  </form>
</div>
