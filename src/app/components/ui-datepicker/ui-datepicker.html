<div
	class="ui-datepicker"
	#trigger
	(click)="toggleDropdown(trigger)"
	[ngStyle]="{
		cursor: isDisabled() ? '' : 'pointer',
		pointerEvents: isDisabled() ? 'none' : ''
	}"
	[ngClass]="[value() ? 'non-empty' : '', isDisabled() ? 'disabled' : '']">
	<div
		class="label-wrapper"
		[ngStyle]="{
			minHeight: fontInputSize() * 0.8 + 'px'
		}">
		<label
			class="ui-datepicker-label"
			[ngStyle]="{
				fontSize: fontInputSize() * 0.8 + 'px'
			}">
			{{ labelName() }}
			@if (isRequired()) {
				<span>*</span>
			}
		</label>
	</div>
	<div class="value-wrapper">
		<div
			class="value"
			[ngStyle]="{
				fontSize: fontInputSize() + 'px',
				minHeight: 22.67 + 'px'
			}">
			@if (value()) {
				{{ value() | date: dateFormat() }}
			}
		</div>
		<icon-calendar class="icon-calendar" />
	</div>
</div>

<ng-template #dropdown>
	<div class="dropdown-panel">
		<div class="calendar-header">
			<div class="calendar-header-text">
				{{ displayMonthYear() }}
			</div>
			<div class="icons">
				<icon-arrow-left class="icon-arrow" (click)="setNavMonthBack()" />
				<icon-arrow-right class="icon-arrow" (click)="setNavMonthForward()" />
			</div>
		</div>
		<div class="calendar">
			@for (w of lang().weeks; let index = $index; track index) {
				<div class="calendar-label">{{ w }}</div>
			}
			@for (w of monthWeeks(); let index = $index; track index) {
				@for (d of w; let indexY = $index; track indexY) {
					<div
						class="calendar-cell"
						[ngStyle]="{
							background: d ? '' : 'none',
							cursor: d ? '' : 'default'
						}"
						[ngClass]="[(d | date: 'dd.MM.yyyy') === (value() && (value() | date: 'dd.MM.yyyy')) ? 'selected' : '']"
						(click)="d && setDate(d)">
						{{ d ? (d | date: 'd') : '' }}
					</div>
				}
			}
		</div>
	</div>
</ng-template>
